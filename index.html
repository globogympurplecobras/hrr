<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HRR Race Timetable — 2026</title>
<style>
  :root{
    --ink:#1a2332;
    --paper:#f7f5f0;
    --line:#d8d3c7;
    --accent:#8a1538;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--paper);
    color:var(--ink);
    padding:0 0 60px 0;
  }
  header{
    position:sticky;
    top:0;
    z-index:20;
    background:var(--accent);
    color:#fff;
    padding:14px 18px 0;
    box-shadow:0 2px 6px rgba(0,0,0,.15);
  }
  header h1{
    margin:0 0 2px;
    font-size:1.2rem;
    font-weight:700;
    letter-spacing:.2px;
  }
  header p{
    margin:0 0 10px;
    font-size:.78rem;
    opacity:.9;
  }
  .toolbar{
    display:flex;
    gap:10px;
    align-items:center;
    margin-bottom:10px;
    flex-wrap:wrap;
  }
  .toolbar input[type="text"]{
    flex:1;
    min-width:140px;
    padding:8px 10px;
    border-radius:8px;
    border:none;
    font-size:.9rem;
  }
  .toolbar button{
    background:#fff;
    color:var(--accent);
    border:none;
    padding:8px 12px;
    border-radius:8px;
    font-size:.8rem;
    font-weight:600;
    cursor:pointer;
    white-space:nowrap;
  }
  .toolbar button:active{ transform:scale(.97); }
  #highlightFilterBtn.active{
    background:#f5a623;
    color:#5c3a00;
    box-shadow:0 0 0 2px #fff inset;
  }
  #status{
    font-size:.72rem;
    opacity:.95;
    margin-left:auto;
    white-space:nowrap;
    display:flex;
    align-items:center;
    gap:5px;
  }
  #status .dot{
    width:8px;height:8px;border-radius:50%;
    background:#f4c542;
    display:inline-block;
  }
  #status.live .dot{ background:#4caf50; }
  #status.local .dot{ background:#f4c542; }
  #status.error .dot{ background:#e53935; }

  .tabs{
    display:flex;
    gap:4px;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    padding-bottom:0;
  }
  .tabs::-webkit-scrollbar{ display:none; }
  .tab{
    flex:0 0 auto;
    background:rgba(255,255,255,.12);
    color:#fff;
    border:none;
    border-radius:10px 10px 0 0;
    padding:9px 14px;
    font-size:.8rem;
    font-weight:700;
    cursor:pointer;
    opacity:.75;
  }
  .tab.active{
    background:var(--paper);
    color:var(--accent);
    opacity:1;
  }
  .tab .count{
    font-weight:500;
    opacity:.7;
    font-size:.7rem;
    margin-left:3px;
  }

  .daybar{
    background:#fff;
    border-bottom:1px solid var(--line);
    padding:12px 18px;
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .daybar .day-label{
    font-weight:700;
    font-size:.95rem;
    margin-right:auto;
  }
  .clip-control{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:.75rem;
    font-weight:700;
    color:#6b6558;
    text-transform:uppercase;
    letter-spacing:.4px;
  }
  .clip-control input{
    width:60px;
    text-align:center;
    font-size:.95rem;
    font-weight:700;
    padding:6px 4px;
    border:2px solid var(--line);
    border-radius:8px;
  }
  .clip-control button{
    background:var(--accent);
    color:#fff;
    border:none;
    padding:7px 10px;
    border-radius:8px;
    font-size:.72rem;
    font-weight:700;
    cursor:pointer;
  }
  .evening-clip-control{
    border-left:1px dashed var(--line);
    padding-left:14px;
  }
  .evs-toggle{
    display:flex;
    border:2px solid var(--line);
    border-radius:8px;
    overflow:hidden;
  }
  .evs-btn{
    background:#fff;
    border:none;
    padding:7px 10px;
    font-size:.7rem;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.4px;
    color:#6b6558;
    cursor:pointer;
  }
  .evs-btn + .evs-btn{
    border-left:2px solid var(--line);
  }
  .evs-btn.active{
    background:var(--accent);
    color:#fff;
  }

  .legend{
    display:flex;
    flex-wrap:wrap;
    gap:6px 10px;
    padding:10px 18px;
    background:#fff;
    border-bottom:1px solid var(--line);
    font-size:.72rem;
  }
  .legend span{
    display:inline-flex;
    align-items:center;
    gap:5px;
    padding:3px 8px;
    border-radius:20px;
    font-weight:600;
  }
  .legend .swatch{
    width:10px;height:10px;border-radius:50%;display:inline-block;
  }

  main{
    padding:14px 10px 0;
    max-width:900px;
    margin:0 auto;
  }
  .empty-day{
    text-align:center;
    padding:50px 20px;
    color:#8a8577;
    font-size:.9rem;
    line-height:1.6;
  }
  .empty-day strong{ display:block; color:var(--ink); font-size:1.05rem; margin-bottom:6px; }

  .session{
    margin:18px 0;
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
    background:#fff;
  }
  .session-summary{
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
    padding:13px 16px;
    font-weight:800;
    font-size:.95rem;
    color:var(--ink);
    list-style:none;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
  }
  .session-summary::-webkit-details-marker{ display:none; }
  .session-summary::marker{ content:""; }
  .session-chevron{
    display:inline-block;
    font-size:.75rem;
    color:#8a8577;
    transition:transform .15s;
    flex:0 0 auto;
  }
  .session[open] .session-chevron{ transform:rotate(90deg); }
  .session-titles{ display:flex; flex-direction:column; gap:1px; }
  .session-sub{
    font-size:.68rem;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:.4px;
    color:#8a8577;
  }
  .session-count{
    margin-left:auto;
    font-weight:600;
    font-size:.78rem;
    color:#8a8577;
    white-space:nowrap;
  }
  .session-body{
    padding:0 10px 10px;
    background:var(--paper);
    border-top:1px solid var(--line);
  }
  .race{
    background:#fff;
    border:1px solid var(--line);
    border-left:7px solid var(--comp-color, #999);
    border-radius:14px;
    padding:14px 16px;
    margin:12px 0;
    display:grid;
    grid-template-columns:auto 1fr auto;
    grid-template-areas:
      "meta comp check"
      "crews crews crews"
      "num num num";
    row-gap:10px;
    column-gap:14px;
    align-items:center;
    transition:box-shadow .15s, opacity .15s, background .15s;
    box-shadow:0 1px 3px rgba(20,15,5,.08);
  }
  .race.ticked{
    opacity:.5;
    background:#e9e4d6;
    border-left-color:#8a8577;
    box-shadow:none;
  }
  .race.ticked .comp{
    background:#8a8577;
  }
  .race.ticked .raceno{
    color:#8a8577;
  }
  .race:not(.ticked){
    box-shadow:0 2px 6px rgba(20,15,5,.10);
  }
  .race.highlighted{
    outline:3px solid #f5a623;
    outline-offset:2px;
  }
  .meta{
    grid-area:meta;
    display:flex;
    align-items:baseline;
    gap:8px;
  }
  .raceno{
    font-weight:800;
    font-size:1.05rem;
    color:var(--comp-color,#333);
    min-width:1.6em;
  }
  .time{
    font-variant-numeric:tabular-nums;
    font-weight:700;
    font-size:.95rem;
    color:var(--ink);
  }
  .comp{
    grid-area:comp;
    font-size:.72rem;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.5px;
    color:#fff;
    background:var(--comp-color,#999);
    padding:3px 9px;
    border-radius:20px;
    justify-self:end;
    white-space:nowrap;
  }
  .check{
    grid-area:check;
    padding-left:6px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:4px;
  }
  .check input{
    width:30px;
    height:30px;
    accent-color:var(--comp-color,#333);
    cursor:pointer;
  }
  .star-btn{
    background:none;
    border:none;
    cursor:pointer;
    font-size:1.35rem;
    line-height:1;
    padding:2px;
    color:#c7c2b3;
    -webkit-tap-highlight-color:transparent;
  }
  .star-btn.active{
    color:#f5a623;
  }
  .crews{
    grid-area:crews;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:6px 10px;
    font-size:.87rem;
    line-height:1.35;
    border-top:1px dashed var(--line);
    padding-top:10px;
  }
  .crew-pick{
    cursor:pointer;
    padding:6px 8px;
    border-radius:9px;
    border:2px solid transparent;
    transition:background .15s, border-color .15s;
    -webkit-tap-highlight-color:transparent;
  }
  .crew-pick:active{
    background:#f1eee4;
  }
  .crew-pick.picked{
    background:#eaf5ec;
    border-color:#2e7d32;
  }
  .crew-label{
    font-size:.65rem;
    font-weight:700;
    text-transform:uppercase;
    color:#8a8577;
    letter-spacing:.4px;
    display:flex;
    align-items:center;
    gap:4px;
  }
  .crew-pick.picked .crew-label{
    color:#2e7d32;
  }
  .crew-pick.picked .crew-label::before{
    content:"🏆";
    font-size:.75rem;
  }
  .crew-name{
    font-weight:600;
  }
  .crew-pick.picked .crew-name{
    color:#1e5a25;
  }
  .num{
    grid-area:num;
    display:flex;
    align-items:center;
    gap:10px;
    justify-content:flex-end;
    border-top:1px dashed var(--line);
    padding-top:10px;
  }
  .num label{
    font-size:.72rem;
    font-weight:700;
    color:#6b6558;
    text-transform:uppercase;
    letter-spacing:.4px;
  }
  .num input{
    width:72px;
    text-align:center;
    font-size:1.1rem;
    font-weight:700;
    font-variant-numeric:tabular-nums;
    padding:8px 4px;
    border:2px solid var(--line);
    border-radius:9px;
    letter-spacing:2px;
  }
  .num input:focus{
    outline:none;
    border-color:var(--comp-color,#333);
  }
  footer{
    text-align:center;
    font-size:.72rem;
    color:#8a8577;
    padding:20px 0 10px;
  }

  /* ===================== View switcher (Timetable / Pipeline) ===================== */
  .view-switch{
    display:flex;
    gap:8px;
    padding:10px 18px;
    background:#0f1720;
    border-bottom:1px solid #000;
  }
  .view-btn{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:7px;
    border:none;
    border-radius:10px;
    padding:11px 10px;
    font-size:.82rem;
    font-weight:800;
    letter-spacing:.2px;
    cursor:pointer;
    background:#1c2732;
    color:#9fb0c0;
    -webkit-tap-highlight-color:transparent;
  }
  .view-btn.active{
    background:var(--paper);
    color:var(--ink);
  }
  .view-btn.pipeline-btn.active{
    background:var(--pipe-amber);
    color:#231600;
  }
  .view-btn .badge{
    background:var(--pipe-amber);
    color:#231600;
    font-size:.7rem;
    font-weight:800;
    border-radius:20px;
    min-width:18px;
    height:18px;
    padding:0 5px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
  }
  .view-btn.active .badge{
    background:#231600;
    color:var(--pipe-amber);
  }

  /* ===================== Pipeline view ===================== */
  :root{
    --pipe-bg:#0b1119;
    --pipe-card:#141d29;
    --pipe-line:#26374a;
    --pipe-amber:#f5a623;
    --pipe-green:#3ecf7e;
    --pipe-text:#e7edf3;
    --pipe-dim:#7c8ba0;
  }
  .pipeline-wrap{
    background:var(--pipe-bg);
    min-height:60vh;
    padding:14px 12px 40px;
    margin:0 -10px;
  }
  .pipeline-intro{
    color:var(--pipe-dim);
    font-size:.78rem;
    padding:2px 6px 14px;
    max-width:900px;
    margin:0 auto;
    line-height:1.5;
  }
  .pipeline-empty{
    text-align:center;
    color:var(--pipe-dim);
    padding:60px 20px;
    font-size:.9rem;
    line-height:1.6;
  }
  .pipeline-empty strong{ display:block; color:var(--pipe-text); font-size:1.05rem; margin-bottom:6px; }
  .pipe-race{
    max-width:900px;
    margin:0 auto 12px;
    background:var(--pipe-card);
    border:1px solid var(--pipe-line);
    border-left:6px solid var(--comp-color,#999);
    border-radius:14px;
    padding:14px 16px;
    color:var(--pipe-text);
  }
  .pipe-race.state-sent{ border-left-color:var(--pipe-amber); }
  .pipe-race.state-received{ border-left-color:var(--pipe-green); opacity:.72; }
  .pipe-top{
    display:flex;
    align-items:baseline;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:6px;
  }
  .pipe-raceno{ font-weight:800; font-size:1rem; color:var(--comp-color,#fff); }
  .pipe-time{ font-variant-numeric:tabular-nums; font-weight:700; font-size:.88rem; color:var(--pipe-text); }
  .pipe-comp{
    font-size:.68rem;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.5px;
    color:#fff;
    background:var(--comp-color,#999);
    padding:2px 8px;
    border-radius:20px;
  }
  .pipe-clip{
    font-size:.72rem;
    font-weight:800;
    letter-spacing:.4px;
    color:var(--pipe-bg);
    background:var(--pipe-text);
    padding:2px 9px;
    border-radius:6px;
    font-variant-numeric:tabular-nums;
  }
  .pipe-status{
    margin-left:auto;
    font-size:.68rem;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:.4px;
    padding:3px 9px;
    border-radius:20px;
    background:#26374a;
    color:var(--pipe-dim);
  }
  .pipe-race.state-sent .pipe-status{ background:rgba(245,166,35,.18); color:var(--pipe-amber); }
  .pipe-race.state-received .pipe-status{ background:rgba(62,207,126,.18); color:var(--pipe-green); }
  .pipe-crews{
    font-size:.85rem;
    color:var(--pipe-dim);
    margin-bottom:12px;
    line-height:1.45;
  }
  .pipe-crews b{ color:var(--pipe-text); font-weight:600; }
  .pipe-actions{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .pipe-action{
    flex:1;
    min-width:130px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:2px;
    border:2px solid var(--pipe-line);
    background:transparent;
    color:var(--pipe-dim);
    border-radius:10px;
    padding:9px 6px;
    font-size:.78rem;
    font-weight:800;
    letter-spacing:.2px;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .pipe-action .sub{ font-size:.65rem; font-weight:600; opacity:.85; }
  .pipe-action.sent-btn.on{ background:rgba(245,166,35,.15); border-color:var(--pipe-amber); color:var(--pipe-amber); }
  .pipe-action.received-btn.on{ background:rgba(62,207,126,.15); border-color:var(--pipe-green); color:var(--pipe-green); }

  @media (min-width:640px){
    .race{
      grid-template-columns:auto auto 1fr auto auto;
      grid-template-areas: "meta comp crews num check";
      column-gap:20px;
    }
    .crews{ border-top:none; padding-top:0; border-left:1px dashed var(--line); padding-left:16px; }
    .num{ border-top:none; padding-top:0; padding-right:14px; border-right:1px dashed var(--line); }
    .check{ padding-left:0; }
  }
</style>
</head>

<header>
  <h1>Henley Royal Regatta — Race Timetable</h1>
  <p>2026 · Tue 30 Jun – Sun 5 Jul</p>
  <div class="toolbar">
    <input type="text" id="filterBox" placeholder="Filter by crew, competition or race no…">
    <button id="highlightFilterBtn">☆ Highlights</button>

</header>

<div class="view-switch">
  <button class="view-btn timetable-btn active" id="viewTimetableBtn">📋 Timetable</button>
  <button class="view-btn pipeline-btn" id="viewPipelineBtn">📡 To editor <span class="badge" id="pipelineBadge" style="display:none">0</span></button>
</div>

<div class="daybar" id="daybar">
  <span class="day-label" id="dayLabel"></span>
  <div class="clip-control">
    <label for="firstClip">Start clip #</label>
    <input id="firstClip" type="text" inputmode="numeric" maxlength="3" pattern="[0-9]*">
    <button id="renumberBtn">Renumber day</button>
  </div>
  <div class="clip-control evening-clip-control" id="eveningClipControl" style="display:none">
    <label for="eveningClip">Evening clip #</label>
    <input id="eveningClip" type="text" inputmode="numeric" maxlength="3" pattern="[0-9]*">
    <div class="evs-toggle" id="evsToggle">
      <button type="button" class="evs-btn" data-evs="1">EVS 1</button>
      <button type="button" class="evs-btn" data-evs="2">EVS 2</button>
    </div>
    <button id="renumberEveningBtn">Renumber evening</button>
  </div>
</div>

<div class="legend" id="legend"></div>

<main id="main"></main>

<footer>Source: hrr.co.uk race timetable · Shared live between everyone viewing this page</footer>

<script>
const DAY_ORDER = ["tuesday","wednesday","thursday","friday","saturday","sunday"];
const DAY_SHORT = {tuesday:"Tue",wednesday:"Wed",thursday:"Thu",friday:"Fri",saturday:"Sat",sunday:"Sun"};
const DEFAULT_START_CLIP = {tuesday:"211",wednesday:"311",thursday:"411",friday:"511",saturday:"611",sunday:"711"};

const compColors = {
  "P Albert":"#8a1538",
  "Temple":"#1f6f4a",
  "Danesfield":"#b5651d",
  "P Philip":"#2a5db0",
  "Island":"#6a3d9a",
  "Wargrave":"#c2185b",
  "Thames":"#00838f",
  "Wyfold":"#5d4037",
  "Britannia":"#c77d00",
  "PE":"#3949ab",
  "Q Victoria":"#607d3b",
  "D Jubilee":"#e64a19",
  "Fawley":"#455a64",
  "P Royal":"#9c27b0",
  "D Sculls":"#d84315",
  "Visitors'":"#00695c",
  "Pr Wales":"#0277bd",
  "Diamonds":"#ad1457",
  "Bridge":"#4527a0",
  "Ladies'":"#33691e",
};
function colorFor(comp){
  if(compColors[comp]) return compColors[comp];
  // stable fallback colour for any competition not in the palette above
  // (e.g. HRR adds/renames an event) so the UI never breaks.
  let hash = 0;
  for(let i=0;i<comp.length;i++) hash = (hash*31 + comp.charCodeAt(i)) >>> 0;
  const hue = hash % 360;
  return `hsl(${hue} 55% 32%)`;
}

// EVS-style clip numbering generalised to any 3-digit starting clip:
// within each block of 10, digits go 1-9 then 0 (e.g. 311..319,310,321...).
function clipNumberFromBase(base, raceOffset){
  const b = parseInt(base, 10);
  if(isNaN(b)) return String(311 + raceOffset);
  const block0 = Math.floor(b/10);
  const digit0 = b%10;
  const startPos = digit0 === 0 ? 9 : digit0 - 1; // position within a decade, 0-8 normally
  const overall = startPos + raceOffset;
  const block = block0 + Math.floor(overall/10);
  const posInBlock = overall % 10;
  const lastDigit = posInBlock === 9 ? 0 : posInBlock + 1;
  return String(block*10 + lastDigit);
}

let schedule = null;      // loaded from data/schedule.json
let currentDay = "wednesday";
let state = {};           // per-day: { [raceNo]: {ticked, num, winner} }
let startClips = {};      // per-day: "311"
let eveningStartClips = {}; // per-day: "611" — separate cascade just for the evening session
let eveningEvs = {};        // per-day: "1" | "2" — which EVS machine the evening session is on
let useFirebase = false;
let dbRoot = null;
const LOCAL_KEY = 'hrr-race-state-v3';

const main = document.getElementById('main');
const legend = document.getElementById('legend');
const statusEl = document.getElementById('status');
const statusText = document.getElementById('statusText');
const filterBox = document.getElementById('filterBox');
let showHighlightsOnly = false;
const tabsEl = document.getElementById('tabs');
const dayLabelEl = document.getElementById('dayLabel');
const firstClipInput = document.getElementById('firstClip');
const daybarEl = document.getElementById('daybar');
const eveningClipControl = document.getElementById('eveningClipControl');
const eveningClipInput = document.getElementById('eveningClip');
const renumberEveningBtn = document.getElementById('renumberEveningBtn');
const evsToggle = document.getElementById('evsToggle');
const viewTimetableBtn = document.getElementById('viewTimetableBtn');
const viewPipelineBtn = document.getElementById('viewPipelineBtn');
const pipelineBadge = document.getElementById('pipelineBadge');
const VIEW_KEY = 'hrr-view-mode-v1';
let currentView = localStorage.getItem(VIEW_KEY) || 'timetable'; // 'timetable' | 'pipeline', per-device only

function setStatus(mode, text){
  statusEl.className = mode;
  statusText.textContent = text;
}

function raceCountForDay(day){
  const d = schedule && schedule.days[day];
  if(!d) return 0;
  return d.races.filter(r=>!r.interval).length;
}

function defaultState(day, n){
  const races = schedule.days[day].races.filter(r=>!r.interval);
  const idx = races.findIndex(r=>r.n===n);
  const base = startClips[day] || DEFAULT_START_CLIP[day] || "311";
  return {ticked:false, num: clipNumberFromBase(base, idx), winner:'', highlight:false, sent:false, received:false, sentAt:null, receivedAt:null};
}

function buildTabs(){
  tabsEl.innerHTML = '';
  DAY_ORDER.forEach(day=>{
    const btn = document.createElement('button');
    btn.className = 'tab' + (day===currentDay ? ' active' : '');
    const n = raceCountForDay(day);
    btn.innerHTML = `${DAY_SHORT[day]}<span class="count">${n?('· '+n):''}</span>`;
    btn.addEventListener('click', ()=> switchDay(day));
    tabsEl.appendChild(btn);
  });
}

function switchDay(day){
  currentDay = day;
  buildTabs();
  const d = schedule.days[day];
  dayLabelEl.textContent = d.label;
  firstClipInput.value = startClips[day] || DEFAULT_START_CLIP[day] || "311";
  filterBox.value = '';
  updateEveningControlUI();
  render();
}

// ---------- Evening-session clip cascade (separate EVS machine) ----------
function eveningSessionForDay(day){
  const d = schedule.days[day];
  if(!d || !d.races || d.races.length === 0) return null;
  const sessions = splitIntoSessions(d.races);
  return sessions.find(s => s.name === 'Evening') || null;
}

function updateEveningControlUI(){
  const evening = eveningSessionForDay(currentDay);
  eveningClipControl.style.display = evening ? '' : 'none';
  if(!evening) return;
  if(eveningClipInput !== document.activeElement){
    eveningClipInput.value = eveningStartClips[currentDay] || '';
  }
  const evs = eveningEvs[currentDay] || '1';
  evsToggle.querySelectorAll('.evs-btn').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.evs === evs);
  });
}

function saveEveningStartClip(day, value){
  eveningStartClips[day] = value;
  if(useFirebase){
    dbRoot.child(`eveningStartClip/${day}`).set(value).catch(()=>{
      setStatus('error', 'Save failed — check connection');
    });
  }else{
    persistLocal();
  }
}

function saveEveningEvs(day, value){
  eveningEvs[day] = value;
  if(useFirebase){
    dbRoot.child(`eveningEvs/${day}`).set(value).catch(()=>{
      setStatus('error', 'Save failed — check connection');
    });
  }else{
    persistLocal();
  }
}

evsToggle.querySelectorAll('.evs-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    saveEveningEvs(currentDay, btn.dataset.evs);
    updateEveningControlUI();
  });
});

eveningClipInput.addEventListener('input', ()=>{
  eveningClipInput.value = eveningClipInput.value.replace(/[^0-9]/g,'').slice(0,3);
});

renumberEveningBtn.addEventListener('click', ()=>{
  const val = eveningClipInput.value.trim();
  if(val.length !== 3){
    alert('Enter a 3-digit starting clip number first, e.g. 611');
    return;
  }
  const evening = eveningSessionForDay(currentDay);
  if(!evening) return;
  saveEveningStartClip(currentDay, val);
  evening.races.forEach((r, idx)=>{
    state[currentDay][r.n] = state[currentDay][r.n] || defaultState(currentDay, r.n);
    state[currentDay][r.n].num = clipNumberFromBase(val, idx);
    saveRace(currentDay, r.n);
  });
  render();
});

function switchView(view){
  currentView = view;
  try{ localStorage.setItem(VIEW_KEY, view); }catch(e){}
  viewTimetableBtn.classList.toggle('active', view === 'timetable');
  viewPipelineBtn.classList.toggle('active', view === 'pipeline');
  daybarEl.style.display = view === 'pipeline' ? 'none' : '';
  legend.style.display = view === 'pipeline' ? 'none' : '';
  render();
}
viewTimetableBtn.addEventListener('click', ()=> switchView('timetable'));
viewPipelineBtn.addEventListener('click', ()=> switchView('pipeline'));

// ---------- Legend ----------
function buildLegend(){
  legend.innerHTML = '';
  const compsInUse = new Set();
  DAY_ORDER.forEach(day=>{
    (schedule.days[day].races||[]).forEach(r=>{ if(!r.interval) compsInUse.add(r.c); });
  });
  Array.from(compsInUse).sort().forEach(name=>{
    const color = colorFor(name);
    const s = document.createElement('span');
    s.style.background = color + '22';
    s.style.color = color;
    s.innerHTML = `<span class="swatch" style="background:${color}"></span>${name}`;
    legend.appendChild(s);
  });
}

// ---------- Firebase (shared, multi-user, multi-day) ----------
function initFirebase(){
  try{
    if(!firebaseConfig.apiKey || firebaseConfig.apiKey.indexOf('YOUR_') === 0) throw new Error('not configured');
    if(!firebaseConfig.databaseURL || firebaseConfig.databaseURL.indexOf('YOUR_') === 0) throw new Error('not configured');

    firebase.initializeApp(firebaseConfig);
    dbRoot = firebase.database().ref();
    useFirebase = true;

    // One-time migration: v2 stored ticks flat under races/{n} for Wednesday only.
    dbRoot.child('races').once('value').then(snap=>{
      const val = snap.val() || {};
      const looksFlat = Object.keys(val).some(k => /^\d+$/.test(k));
      if(looksFlat && !val.wednesday){
        dbRoot.child('races/wednesday').set(val).then(()=>{
          // leave the old flat keys in place untouched; harmless, just unused.
        });
      }
    });

    dbRoot.child('startClip').on('value', snap=>{
      startClips = snap.val() || {};
      if(firstClipInput === document.activeElement) return;
      firstClipInput.value = startClips[currentDay] || DEFAULT_START_CLIP[currentDay] || "311";
    });

    dbRoot.child('eveningStartClip').on('value', snap=>{
      eveningStartClips = snap.val() || {};
      updateEveningControlUI();
    });

    dbRoot.child('eveningEvs').on('value', snap=>{
      eveningEvs = snap.val() || {};
      updateEveningControlUI();
    });

    dbRoot.child('races').on('value', snap=>{
      const val = snap.val() || {};
      DAY_ORDER.forEach(day=>{
        state[day] = val[day] || {};
      });
      applyStateToDOM();
      setStatus('live', 'Live · shared with everyone');
    }, err=>{
      console.error(err);
      setStatus('error', 'Connection error — check Firebase rules');
    });
  }catch(e){
    useFirebase = false;
    initLocalFallback();
  }
}

function persistLocal(){
  try{
    localStorage.setItem(LOCAL_KEY, JSON.stringify({state, startClips, eveningStartClips, eveningEvs}));
  }catch(e){}
}

function saveRace(day, n){
  if(useFirebase){
    dbRoot.child(`races/${day}/${n}`).set(state[day][n]).catch(()=>{
      setStatus('error', 'Save failed — check connection');
    });
  }else{
    persistLocal();
    setStatus('local', 'Saved on this device only');
  }
}

function saveStartClip(day, value){
  startClips[day] = value;
  if(useFirebase){
    dbRoot.child(`startClip/${day}`).set(value).catch(()=>{
      setStatus('error', 'Save failed — check connection');
    });
  }else{
    persistLocal();
  }
}

function initLocalFallback(){
  try{
    const raw = localStorage.getItem(LOCAL_KEY);
    const parsed = raw ? JSON.parse(raw) : {};
    state = parsed.state || {};
    startClips = parsed.startClips || {};
    eveningStartClips = parsed.eveningStartClips || {};
    eveningEvs = parsed.eveningEvs || {};
  }catch(e){ state = {}; startClips = {}; eveningStartClips = {}; eveningEvs = {}; }
  DAY_ORDER.forEach(day=>{ if(!state[day]) state[day] = {}; });
  firstClipInput.value = startClips[currentDay] || DEFAULT_START_CLIP[currentDay] || "311";
  updateEveningControlUI();
  render();
  setStatus('local', 'Local-only mode — add Firebase config to share (see README)');
}

// ---------- Rendering ----------
function raceRowHTML(r, day){
  const color = colorFor(r.c);
  const st = (state[day] && state[day][r.n]) || defaultState(day, r.n);
  const berksPicked = st.winner === 'berks';
  const bucksPicked = st.winner === 'bucks';
  return `
    <div class="race${st.ticked?' ticked':''}${st.highlight?' highlighted':''}" data-race="${r.n}" style="--comp-color:${color}">
      <div class="meta">
        <span class="raceno">#${r.n}</span>
        <span class="time">${r.t}</span>
      </div>
      <div class="comp">${r.c}</div>
      <div class="crews">
        <div class="crew-pick${berksPicked?' picked':''}" data-side="berks">
          <div class="crew-label">Berks</div>
          <div class="crew-name">${r.berks}</div>
        </div>
        <div class="crew-pick${bucksPicked?' picked':''}" data-side="bucks">
          <div class="crew-label">Bucks</div>
          <div class="crew-name">${r.bucks}</div>
        </div>
      </div>
      <div class="num">
        <label for="num-${r.n}">No.</label>
        <input id="num-${r.n}" type="text" inputmode="numeric" maxlength="3" pattern="[0-9]*" value="${st.num||''}">
      </div>
      <div class="check">
        <input type="checkbox" id="chk-${r.n}" ${st.ticked?'checked':''}>
        <button type="button" class="star-btn${st.highlight?' active':''}" id="star-${r.n}" aria-label="Mark as highlight" title="Mark as highlight">${st.highlight?'★':'☆'}</button>
      </div>
    </div>
  `;
}

function wireRow(el, r, day){
  const chk = el.querySelector('input[type="checkbox"]');
  const num = el.querySelector('.num input');
  const star = el.querySelector('.star-btn');
  const picks = el.querySelectorAll('.crew-pick');

  chk.addEventListener('change', ()=>{
    state[day][r.n] = state[day][r.n] || defaultState(day, r.n);
    state[day][r.n].ticked = chk.checked;
    el.classList.toggle('ticked', chk.checked);
    saveRace(day, r.n);
  });

  num.addEventListener('input', ()=>{
    num.value = num.value.replace(/[^0-9]/g,'').slice(0,3);
    state[day][r.n] = state[day][r.n] || defaultState(day, r.n);
    state[day][r.n].num = num.value;
    saveRace(day, r.n);
  });

  star.addEventListener('click', ()=>{
    state[day][r.n] = state[day][r.n] || defaultState(day, r.n);
    const on = !state[day][r.n].highlight;
    state[day][r.n].highlight = on;
    star.classList.toggle('active', on);
    star.textContent = on ? '★' : '☆';
    el.classList.toggle('highlighted', on);
    saveRace(day, r.n);
  });

  picks.forEach(pick=>{
    pick.addEventListener('click', ()=>{
      state[day][r.n] = state[day][r.n] || defaultState(day, r.n);
      const side = pick.dataset.side;
      // tap again to un-pick, tap the other side to switch
      state[day][r.n].winner = (state[day][r.n].winner === side) ? '' : side;
      picks.forEach(p => p.classList.toggle('picked', p.dataset.side === state[day][r.n].winner));
      saveRace(day, r.n);
    });
  });
}

function splitIntoSessions(races){
  const segments = [[]];
  const precededBy = [null];
  races.forEach(r=>{
    if(r.interval){
      precededBy.push(r.interval);
      segments.push([]);
    }else{
      segments[segments.length-1].push(r);
    }
  });
  const names = segments.length === 3 ? ["Morning","Afternoon","Evening"]
    : segments.length === 2 ? ["Morning","Afternoon"]
    : segments.length === 1 ? ["All races"]
    : segments.map((_,i)=>`Session ${i+1}`);
  return segments.map((races,i)=>({ name: names[i], precededBy: precededBy[i], races }))
    .filter(seg => seg.races.length > 0);
}

const COLLAPSE_KEY = 'hrr-session-collapse-v3';
let collapseState = {};
try{ collapseState = JSON.parse(localStorage.getItem(COLLAPSE_KEY) || '{}'); }catch(e){ collapseState = {}; }

function isSessionOpen(day, sessionName){
  const saved = collapseState[day] && collapseState[day][sessionName];
  return saved === undefined ? true : saved; // default: expanded
}
function setSessionOpen(day, sessionName, open){
  collapseState[day] = collapseState[day] || {};
  collapseState[day][sessionName] = open;
  try{ localStorage.setItem(COLLAPSE_KEY, JSON.stringify(collapseState)); }catch(e){}
}

function render(){
  if(currentView === 'pipeline'){
    renderPipeline();
    updatePipelineBadge();
    return;
  }
  renderTimetable();
  updatePipelineBadge();
}

function renderTimetable(){
  main.innerHTML = '';
  const d = schedule.days[currentDay];
  if(!d || d.races.length === 0){
    main.innerHTML = `<div class="empty-day"><strong>Not published yet</strong>
      HRR hasn't posted ${DAY_SHORT[currentDay]}'s draw yet — each day's races
      depend on who wins the day before. Run the "Update races" workflow in
      GitHub Actions once it's live and this tab will fill in automatically.</div>`;
    return;
  }
  const f = (filterBox.value||'').trim().toLowerCase();
  const forceOpen = !!f || showHighlightsOnly;
  const sessions = splitIntoSessions(d.races);

  sessions.forEach(session=>{
    let visibleRaces = session.races;
    if(f) visibleRaces = visibleRaces.filter(r => `${r.n} ${r.t} ${r.c} ${r.berks} ${r.bucks}`.toLowerCase().includes(f));
    if(showHighlightsOnly) visibleRaces = visibleRaces.filter(r => {
      const st = (state[currentDay] && state[currentDay][r.n]) || defaultState(currentDay, r.n);
      return !!st.highlight;
    });
    if(forceOpen && visibleRaces.length === 0) return; // hide empty sessions while filtering

    const details = document.createElement('details');
    details.className = 'session';
    const open = forceOpen ? true : isSessionOpen(currentDay, session.name);
    if(open) details.open = true;

    const subLabel = session.precededBy ? `Starts after ${session.precededBy}` : '';
    const summary = document.createElement('summary');
    summary.className = 'session-summary';
    summary.innerHTML = `
      <span class="session-chevron">▸</span>
      <span class="session-titles">
        <span>${session.name}</span>
        ${subLabel ? `<span class="session-sub">${subLabel}</span>` : ''}
      </span>
      <span class="session-count">${visibleRaces.length} race${visibleRaces.length===1?'':'s'}</span>
    `;
    details.appendChild(summary);

    const body = document.createElement('div');
    body.className = 'session-body';
    visibleRaces.forEach(r=>{
      const wrap = document.createElement('div');
      wrap.innerHTML = raceRowHTML(r, currentDay).trim();
      const el = wrap.firstElementChild;
      body.appendChild(el);
      wireRow(el, r, currentDay);
    });
    details.appendChild(body);

    if(!forceOpen){
      details.addEventListener('toggle', ()=>{
        setSessionOpen(currentDay, session.name, details.open);
      });
    }

    main.appendChild(details);
  });
}

// ---------- Pipeline view: highlighted races -> sent -> received ----------
function highlightedRacesForDay(day){
  const d = schedule.days[day];
  if(!d) return [];
  return d.races.filter(r=>{
    if(r.interval) return false;
    const st = (state[day] && state[day][r.n]) || defaultState(day, r.n);
    return !!st.highlight;
  });
}

function fmtTime(iso){
  if(!iso) return '';
  try{
    const dt = new Date(iso);
    return dt.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  }catch(e){ return ''; }
}

function updatePipelineBadge(){
  if(!schedule){ return; }
  const races = highlightedRacesForDay(currentDay);
  const awaiting = races.filter(r=>{
    const st = (state[currentDay] && state[currentDay][r.n]) || defaultState(currentDay, r.n);
    return st.sent && !st.received;
  }).length;
  if(awaiting > 0){
    pipelineBadge.style.display = 'inline-flex';
    pipelineBadge.textContent = String(awaiting);
  }else{
    pipelineBadge.style.display = 'none';
  }
}

function pipeRaceHTML(r, day){
  const color = colorFor(r.c);
  const st = (state[day] && state[day][r.n]) || defaultState(day, r.n);
  const cls = st.received ? 'state-received' : (st.sent ? 'state-sent' : 'state-none');
  const statusLabel = st.received ? '✓ Received' : (st.sent ? 'Sent — awaiting' : 'Not sent');
  const sentSub = st.sentAt ? `Sent ${fmtTime(st.sentAt)}` : 'Tap when handed off';
  const recSub = st.receivedAt ? `Received ${fmtTime(st.receivedAt)}` : 'Tap when it arrives';
  return `
    <div class="pipe-race ${cls}" data-race="${r.n}" style="--comp-color:${color}">
      <div class="pipe-top">
        <span class="pipe-raceno">#${r.n}</span>
        <span class="pipe-time">${r.t}</span>
        <span class="pipe-comp">${r.c}</span>
        ${st.num ? `<span class="pipe-clip">Clip ${st.num}</span>` : ''}
        <span class="pipe-status">${statusLabel}</span>
      </div>
      <div class="pipe-crews"><b>Berks</b> ${r.berks} &nbsp;·&nbsp; <b>Bucks</b> ${r.bucks}</div>
      <div class="pipe-actions">
        <button type="button" class="pipe-action sent-btn${st.sent?' on':''}" data-action="sent">
          <span>📤 ${st.sent ? 'Sent' : 'Mark sent'}</span>
          <span class="sub">${sentSub}</span>
        </button>
        <button type="button" class="pipe-action received-btn${st.received?' on':''}" data-action="received">
          <span>📥 ${st.received ? 'Received' : 'Mark received'}</span>
          <span class="sub">${recSub}</span>
        </button>
      </div>
    </div>
  `;
}

function togglePipeField(day, n, field, atField){
  state[day][n] = state[day][n] || defaultState(day, n);
  const on = !state[day][n][field];
  state[day][n][field] = on;
  state[day][n][atField] = on ? new Date().toISOString() : null;
  // Un-marking "sent" also clears "received" — a race can't be received before it's sent.
  if(field === 'sent' && !on){
    state[day][n].received = false;
    state[day][n].receivedAt = null;
  }
  saveRace(day, n);
}

function wirePipeRow(el, r, day){
  el.querySelector('[data-action="sent"]').addEventListener('click', ()=>{
    togglePipeField(day, r.n, 'sent', 'sentAt');
    render();
  });
  el.querySelector('[data-action="received"]').addEventListener('click', ()=>{
    const st = (state[day] && state[day][r.n]) || defaultState(day, r.n);
    if(!st.sent){ return; } // must be sent first
    togglePipeField(day, r.n, 'received', 'receivedAt');
    render();
  });
}

function renderPipeline(){
  main.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'pipeline-wrap';

  const d = schedule.days[currentDay];
  if(!d || d.races.length === 0){
    wrap.innerHTML = `<div class="pipeline-empty"><strong>Nothing to send yet</strong>
      ${d ? d.label : ''} hasn't got any races published.</div>`;
    main.appendChild(wrap);
    return;
  }

  const races = highlightedRacesForDay(currentDay);
  if(races.length === 0){
    wrap.innerHTML = `<div class="pipeline-empty"><strong>No highlights marked</strong>
      Go to the Timetable tab and tap ☆ on a race to add it here.</div>`;
    main.appendChild(wrap);
    return;
  }

  const intro = document.createElement('div');
  intro.className = 'pipeline-intro';
  intro.textContent = `${races.length} highlighted race${races.length===1?'':'s'} for ${d.label}. Mark a race "Sent" once it's handed off, and "Received" once the editor has it — synced live to everyone on this page.`;
  wrap.appendChild(intro);

  races.forEach(r=>{
    const rowWrap = document.createElement('div');
    rowWrap.innerHTML = pipeRaceHTML(r, currentDay).trim();
    const el = rowWrap.firstElementChild;
    wrap.appendChild(el);
    wirePipeRow(el, r, currentDay);
  });

  main.appendChild(wrap);
}

// Called whenever fresh data arrives from Firebase. Skips any field the
// user is actively typing in so nobody's cursor gets kicked out mid-edit.
function applyStateToDOM(){
  const d = schedule.days[currentDay];
  if(!d || d.races.length === 0){ render(); return; }
  if(currentView === 'pipeline'){ render(); return; }
  if(main.children.length === 0){ render(); return; }
  if(showHighlightsOnly){
    // visibility itself depends on synced highlight flags, so just rebuild
    render();
    return;
  }
  d.races.forEach(r=>{
    if(r.interval) return;
    const el = main.querySelector(`.race[data-race="${r.n}"]`);
    if(!el) return;
    const st = (state[currentDay] && state[currentDay][r.n]) || defaultState(currentDay, r.n);
    const chk = el.querySelector('input[type="checkbox"]');
    const num = el.querySelector('.num input');
    const star = el.querySelector('.star-btn');
    const picks = el.querySelectorAll('.crew-pick');
    if(document.activeElement !== chk){
      chk.checked = !!st.ticked;
      el.classList.toggle('ticked', !!st.ticked);
    }
    if(document.activeElement !== num) num.value = st.num || '';
    star.classList.toggle('active', !!st.highlight);
    star.textContent = st.highlight ? '★' : '☆';
    el.classList.toggle('highlighted', !!st.highlight);
    picks.forEach(p => p.classList.toggle('picked', p.dataset.side === st.winner));
  });
  buildTabs();
  updatePipelineBadge();
}

filterBox.addEventListener('input', render);

document.getElementById('highlightFilterBtn').addEventListener('click', (e)=>{
  showHighlightsOnly = !showHighlightsOnly;
  e.currentTarget.classList.toggle('active', showHighlightsOnly);
  e.currentTarget.textContent = showHighlightsOnly ? '★ Highlights' : '☆ Highlights';
  render();
});

document.getElementById('clearAllBtn').addEventListener('click', ()=>{
  const dayName = schedule.days[currentDay].label;
  if(!confirm(`Reset all ticks, clip numbers, winners and highlights for ${dayName} — for everyone viewing this page?`)) return;
  const races = schedule.days[currentDay].races.filter(r=>!r.interval);
  races.forEach(r=>{
    state[currentDay][r.n] = defaultState(currentDay, r.n);
    saveRace(currentDay, r.n);
  });
  render();
});

firstClipInput.addEventListener('input', ()=>{
  firstClipInput.value = firstClipInput.value.replace(/[^0-9]/g,'').slice(0,3);
});

document.getElementById('renumberBtn').addEventListener('click', ()=>{
  const val = firstClipInput.value.trim();
  if(val.length !== 3){
    alert('Enter a 3-digit starting clip number first, e.g. 311');
    return;
  }
  saveStartClip(currentDay, val);
  const races = schedule.days[currentDay].races.filter(r=>!r.interval);
  races.forEach(r=>{
    state[currentDay][r.n] = state[currentDay][r.n] || {ticked:false, winner:'', highlight:false};
    state[currentDay][r.n].num = clipNumberFromBase(val, races.findIndex(x=>x.n===r.n));
    saveRace(currentDay, r.n);
  });
  render();
});

// Picks whichever day tab matches today's date, based on each day's
// label (e.g. "Wednesday 1 July 2026"). Falls back to the nearest
// upcoming day if today falls outside the regatta week, or the last
// published day if the regatta is already over.
function pickDefaultDay(){
  const monthNames = ["january","february","march","april","may","june","july","august","september","october","november","december"];
  function parseLabelDate(label){
    const m = label && label.match(/(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})/);
    if(!m) return null;
    const day = parseInt(m[1],10);
    const month = monthNames.indexOf(m[2].toLowerCase());
    const year = parseInt(m[3],10);
    if(month<0) return null;
    return new Date(year, month, day);
  }
  const today = new Date();
  today.setHours(0,0,0,0);
  const candidates = DAY_ORDER
    .map(day=>({day, date: parseLabelDate(schedule.days[day] && schedule.days[day].label)}))
    .filter(c=>c.date);
  if(candidates.length === 0) return currentDay;
  candidates.sort((a,b)=>a.date-b.date);
  const exact = candidates.find(c=>c.date.getTime() === today.getTime());
  if(exact) return exact.day;
  const upcoming = candidates.find(c=>c.date.getTime() > today.getTime());
  if(upcoming) return upcoming.day;
  return candidates[candidates.length-1].day;
}

// ---------- Boot ----------
fetch('data/schedule.json', {cache:'no-store'})
  .then(res=>res.json())
  .then(data=>{
    schedule = data;
    currentDay = pickDefaultDay();
    buildTabs();
    buildLegend();
    const d = schedule.days[currentDay];
    dayLabelEl.textContent = d.label;
    firstClipInput.value = startClips[currentDay] || DEFAULT_START_CLIP[currentDay];
    updateEveningControlUI();
    viewTimetableBtn.classList.toggle('active', currentView === 'timetable');
    viewPipelineBtn.classList.toggle('active', currentView === 'pipeline');
    daybarEl.style.display = currentView === 'pipeline' ? 'none' : '';
    legend.style.display = currentView === 'pipeline' ? 'none' : '';
    initFirebase();
  })
  .catch(err=>{
    console.error(err);
    main.innerHTML = `<div class="empty-day"><strong>Couldn't load schedule data</strong>
      Make sure data/schedule.json was uploaded alongside index.html.</div>`;
    setStatus('error', 'Failed to load schedule.json');
  });
</script>
