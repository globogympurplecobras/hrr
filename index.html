<title>HRR Race Timetable — Wed 1 July 2026</title>
<style>
  :root{
    --ink:#1a2332;
    --paper:#f7f5f0;
    --line:#d8d3c7;
    --accent:#8a1538; /* HRR maroon-ish */
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--paper);
    color:var(--ink);
    padding:0 0 60px 0;
  }
  header{
    position:sticky;
    top:0;
    z-index:20;
    background:var(--accent);
    color:#fff;
    padding:14px 18px 12px;
    box-shadow:0 2px 6px rgba(0,0,0,.15);
  }
  header h1{
    margin:0 0 2px;
    font-size:1.25rem;
    font-weight:700;
    letter-spacing:.2px;
  }
  header p{
    margin:0;
    font-size:.8rem;
    opacity:.9;
  }
  .toolbar{
    display:flex;
    gap:10px;
    align-items:center;
    margin-top:10px;
    flex-wrap:wrap;
  }
  .toolbar input[type="text"]{
    flex:1;
    min-width:140px;
    padding:8px 10px;
    border-radius:8px;
    border:none;
    font-size:.9rem;
  }
  .toolbar button{
    background:#fff;
    color:var(--accent);
    border:none;
    padding:8px 12px;
    border-radius:8px;
    font-size:.8rem;
    font-weight:600;
    cursor:pointer;
  }
  .toolbar button:active{ transform:scale(.97); }
  #status{
    font-size:.72rem;
    opacity:.95;
    margin-left:auto;
    white-space:nowrap;
    display:flex;
    align-items:center;
    gap:5px;
  }
  #status .dot{
    width:8px;height:8px;border-radius:50%;
    background:#f4c542;
    display:inline-block;
  }
  #status.live .dot{ background:#4caf50; }
  #status.local .dot{ background:#f4c542; }
  #status.error .dot{ background:#e53935; }
  .legend{
    display:flex;
    flex-wrap:wrap;
    gap:6px 10px;
    padding:10px 18px;
    background:#fff;
    border-bottom:1px solid var(--line);
    font-size:.72rem;
  }
  .legend span{
    display:inline-flex;
    align-items:center;
    gap:5px;
    padding:3px 8px;
    border-radius:20px;
    font-weight:600;
  }
  .legend .swatch{
    width:10px;height:10px;border-radius:50%;display:inline-block;
  }
  main{
    padding:14px 10px 0;
    max-width:900px;
    margin:0 auto;
  }
  .interval{
    text-align:center;
    font-weight:700;
    letter-spacing:1.5px;
    text-transform:uppercase;
    font-size:.78rem;
    color:#6b5b46;
    background:repeating-linear-gradient(45deg,#efe6d0,#efe6d0 8px,#e9dfc6 8px,#e9dfc6 16px);
    border:1px solid #d9cba5;
    border-radius:10px;
    padding:10px;
    margin:18px 0;
  }
  .race{
    background:#fff;
    border:1px solid var(--line);
    border-left:7px solid var(--comp-color, #999);
    border-radius:14px;
    padding:14px 16px;
    margin:12px 0;
    display:grid;
    grid-template-columns:auto 1fr auto;
    grid-template-areas:
      "meta comp check"
      "crews crews crews"
      "num num num";
    row-gap:10px;
    column-gap:14px;
    align-items:center;
    transition:box-shadow .15s;
  }
  .race.ticked{
    box-shadow:0 0 0 2px var(--comp-color, #999) inset;
    background:#fffdf7;
  }
  .meta{
    grid-area:meta;
    display:flex;
    align-items:baseline;
    gap:8px;
  }
  .raceno{
    font-weight:800;
    font-size:1.05rem;
    color:var(--comp-color,#333);
    min-width:1.6em;
  }
  .time{
    font-variant-numeric:tabular-nums;
    font-weight:700;
    font-size:.95rem;
    color:var(--ink);
  }
  .comp{
    grid-area:comp;
    font-size:.72rem;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.5px;
    color:#fff;
    background:var(--comp-color,#999);
    padding:3px 9px;
    border-radius:20px;
    justify-self:end;
    white-space:nowrap;
  }
  .check{
    grid-area:check;
    padding-left:6px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .check input{
    width:30px;
    height:30px;
    accent-color:var(--comp-color,#333);
    cursor:pointer;
  }
  .crews{
    grid-area:crews;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:6px 18px;
    font-size:.87rem;
    line-height:1.35;
    border-top:1px dashed var(--line);
    padding-top:10px;
  }
  .crew-label{
    font-size:.65rem;
    font-weight:700;
    text-transform:uppercase;
    color:#8a8577;
    letter-spacing:.4px;
  }
  .crew-name{
    font-weight:600;
  }
  .num{
    grid-area:num;
    display:flex;
    align-items:center;
    gap:10px;
    justify-content:flex-end;
    border-top:1px dashed var(--line);
    padding-top:10px;
  }
  .num label{
    font-size:.72rem;
    font-weight:700;
    color:#6b6558;
    text-transform:uppercase;
    letter-spacing:.4px;
  }
  .num input{
    width:72px;
    text-align:center;
    font-size:1.1rem;
    font-weight:700;
    font-variant-numeric:tabular-nums;
    padding:8px 4px;
    border:2px solid var(--line);
    border-radius:9px;
    letter-spacing:2px;
  }
  .num input:focus{
    outline:none;
    border-color:var(--comp-color,#333);
  }
  footer{
    text-align:center;
    font-size:.72rem;
    color:#8a8577;
    padding:20px 0 10px;
  }
  @media (min-width:640px){
    .race{
      grid-template-columns:auto auto 1fr auto auto;
      grid-template-areas: "meta comp crews num check";
      column-gap:20px;
    }
    .crews{ border-top:none; padding-top:0; border-left:1px dashed var(--line); padding-left:16px; }
    .num{ border-top:none; padding-top:0; padding-right:14px; border-right:1px dashed var(--line); }
    .check{ padding-left:0; }
  }
</style>
</head>

// EVS-style clip numbering: within each block of 10, 1-9 then 0.
// e.g. 311,312,...,319,310, then 321,...,329,320, then 331...
function defaultClipNumber(raceIndex){
  const i = raceIndex - 1; // zero-based
  const block = 31 + Math.floor(i / 10);
  const posInBlock = i % 10; // 0..9
  const lastDigit = posInBlock === 9 ? 0 : posInBlock + 1;
  return String(block * 10 + lastDigit);
}

  legend.appendChild(s);
});

let state = {}; // { [raceNo]: {ticked:bool, num:string} }
let useFirebase = false;
let dbRef = null;
const LOCAL_KEY = 'hrr-race-state-v1';

function setStatus(mode, text){
  statusEl.className = mode;
  statusText.textContent = text;
}

function defaultState(n){
  return {ticked:false, num: defaultClipNumber(n)};
}

// ---------- Firebase (shared, multi-user) ----------
function initFirebase(){
  try{
    if(!firebaseConfig.apiKey || firebaseConfig.apiKey.indexOf('YOUR_') === 0){
      throw new Error('not configured');
    }
    if(!firebaseConfig.databaseURL || firebaseConfig.databaseURL.indexOf('YOUR_') === 0){
      throw new Error('not configured');
    }
    firebase.initializeApp(firebaseConfig);
    dbRef = firebase.database().ref('races');
    useFirebase = true;

    dbRef.on('value', snap => {
      state = snap.val() || {};
      // fill in any missing races with defaults (first-ever load)
      let needsSeed = false;
      races.forEach(r=>{
        if(r.interval) return;
        if(!state[r.n]){ needsSeed = true; }
      });
      if(needsSeed){
        races.forEach(r=>{
          if(r.interval) return;
          if(!state[r.n]) state[r.n] = defaultState(r.n);
        });
      }
      applyStateToDOM(true);
      setStatus('live', 'Live · shared with everyone');
    }, err => {
      console.error(err);
      setStatus('error', 'Connection error — check Firebase rules');
    });
  }catch(e){
    useFirebase = false;
    initLocalFallback();
  }
}

function saveRace(n){
  if(useFirebase){
    dbRef.child(String(n)).set(state[n]).catch(()=>{
      setStatus('error', 'Save failed — check connection');
    });
  }else{
    localStorage.setItem(LOCAL_KEY, JSON.stringify(state));
    setStatus('local', 'Saved on this device only');
  }
}

// ---------- Local fallback (single device, no sharing) ----------
function initLocalFallback(){
  try{
    const raw = localStorage.getItem(LOCAL_KEY);
    state = raw ? JSON.parse(raw) : {};
  }catch(e){ state = {}; }
  races.forEach(r=>{
    if(r.interval) return;
    if(!state[r.n]) state[r.n] = defaultState(r.n);
  });
  render(filterBox.value);
  setStatus('local', 'Local-only mode — add Firebase config to share (see README)');
}

        </div>
        <div>
          <div class="crew-label">Bucks</div>
          <div class="crew-name">${r.bucks}</div>
        </div>
      </div>
      <div class="num">
        <label for="num-${r.n}">No.</label>
        <input id="num-${r.n}" type="text" inputmode="numeric" maxlength="3" pattern="[0-9]*" value="${st.num||''}">
      </div>
      <div class="check">
        <input type="checkbox" id="chk-${r.n}" ${st.ticked?'checked':''}>
      </div>
    </div>
  `;
}

function wireRow(el, r){
  const chk = el.querySelector('input[type="checkbox"]');
  const num = el.querySelector('input[type="text"]');

  chk.addEventListener('change', ()=>{
    state[r.n] = state[r.n] || defaultState(r.n);
    state[r.n].ticked = chk.checked;
    el.classList.toggle('ticked', chk.checked);
    saveRace(r.n);
  });

  num.addEventListener('input', ()=>{
    num.value = num.value.replace(/[^0-9]/g,'').slice(0,3);
    state[r.n] = state[r.n] || defaultState(r.n);
    state[r.n].num = num.value;
    saveRace(r.n);
  });
}

function render(filterText){
  main.innerHTML = '';
  const f = (filterText||'').trim().toLowerCase();
  races.forEach(r=>{
    if(r.interval){
      if(!f){
        const div = document.createElement('div');
        div.className = 'interval';
        div.textContent = r.interval;
        main.appendChild(div);
      }
      return;
    }
    const hay = `${r.n} ${r.t} ${r.c} ${r.berks} ${r.bucks}`.toLowerCase();
    if(f && !hay.includes(f)) return;

    const wrap = document.createElement('div');
    wrap.innerHTML = raceRowHTML(r).trim();
    const el = wrap.firstElementChild;
    main.appendChild(el);
    wireRow(el, r);
  });
}

// Called whenever fresh data arrives from Firebase. Rebuilds the list only
// when the set of visible races has changed (e.g. first load); otherwise
// updates values in place and skips any field the user is actively typing
// in, so nobody's cursor gets kicked out mid-edit.
let lastRenderedFilter = null;
function applyStateToDOM(){
  const f = filterBox.value;
  if(lastRenderedFilter === null || main.children.length === 0){
    render(f);
    lastRenderedFilter = f;
    return;
  }
  races.forEach(r=>{
    if(r.interval) return;
    const el = main.querySelector(`.race[data-race="${r.n}"]`);
    if(!el) return;
    const st = state[r.n] || defaultState(r.n);
    const chk = el.querySelector('input[type="checkbox"]');
    const num = el.querySelector('input[type="text"]');
    if(document.activeElement !== chk){
      chk.checked = !!st.ticked;
      el.classList.toggle('ticked', !!st.ticked);
    }
    if(document.activeElement !== num){
      num.value = st.num || '';
    }
  });
}

filterBox.addEventListener('input', ()=>{
  render(filterBox.value);
  lastRenderedFilter = filterBox.value;
});

document.getElementById('clearAllBtn').addEventListener('click', ()=>{
  if(!confirm('Reset all ticks and clip numbers back to defaults for everyone viewing this page?')) return;
  races.forEach(r=>{
    if(r.interval) return;
    state[r.n] = defaultState(r.n);
    saveRace(r.n);
  });
  render(filterBox.value);
});

initFirebase();
</script>
</body>
</html>
